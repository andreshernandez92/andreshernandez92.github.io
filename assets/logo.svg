<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#36d1dc" stop-opacity="1" />
      <stop offset="100%" stop-color="#5b86e5" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- Dark Background -->
  <rect width="500" height="500" fill="#0a0a1a" rx="50" />

  <!-- Hexagon Outer Boundary -->
  <polygon points="250,70 410,160 410,340 250,430 90,340 90,160" fill="none" stroke="url(#primaryGradient)" stroke-width="8" stroke-opacity="0.3"/>

  <!-- Network Nodes -->
  <circle cx="250" cy="70" r="12" fill="#FCA311" />
  <circle cx="410" cy="160" r="10" fill="#36d1dc" />
  <circle cx="90" cy="340" r="10" fill="#36d1dc" />
  <circle cx="250" cy="430" r="12" fill="#5b86e5" />

  <!-- Connecting Lines -->
  <line x1="250" y1="70" x2="250" y2="150" stroke="#FCA311" stroke-width="4" stroke-dasharray="6,6" />
  <line x1="90" y1="340" x2="160" y2="300" stroke="#36d1dc" stroke-width="4" stroke-dasharray="6,6" />

  <!-- Monogram -->
  <text x="50%" y="54%" font-family="Arial, sans-serif" font-size="160" font-weight="900" fill="url(#primaryGradient)" text-anchor="middle" dominant-baseline="middle" letter-spacing="-4">AH</text>
  
  <!-- Subtitle -->
  <text x="50%" y="72%" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="#8a8a9a" text-anchor="middle" letter-spacing="4">SYSTEMS &amp; AUTOMATION</text>
</svg>
